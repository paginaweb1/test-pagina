<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Silla Vacía</title>

<meta name="theme-color" content="#0b1c2c">
<link rel="icon" href="/test-pagina/favicon.png">

<!-- PRELOAD LOGO -->
<link rel="preload" as="image" href="/test-pagina/logocasaroca.webp">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0b1c2c;
color:white;
}

/* INTRO */
#splash{
position:fixed;
width:100%;
height:100%;
background:#0b1c2c;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 0.8s ease 1.5s forwards;
}

#splash img{
width:70%;
max-width:260px;
animation:zoom 0.8s ease;
}

@keyframes zoom{
0%{transform:scale(0.85);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0; visibility:hidden;}
}

/* CONTENIDO */
.container{
padding:12px;
opacity:0;
animation:show 0.5s ease 1.6s forwards;
}

@keyframes show{
to{opacity:1;}
}

.title{
text-align:center;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

/* EFECTO DORADO */
@keyframes goldSweep {
0%{background-position:-200% center;}
100%{background-position:200% center;}
}

.location{
display:flex;
justify-content:center;
margin:10px auto;
padding:10px;
border-radius:12px;
text-decoration:none;
font-size:13px;
font-weight:bold;
color:#000;

background:linear-gradient(
120deg,
#8c6f1d 0%,
#b8962e 30%,
#e0c15a 50%,
#b8962e 70%,
#8c6f1d 100%
);

background-size:200% auto;
animation:goldSweep 4s linear infinite;
}

.invite-main{
text-align:center;
margin-bottom:8px;
font-size:15px;
font-weight:bold;
color:#e0c15a;
}

.frase{
text-align:center;
font-size:13px;
margin-bottom:15px;
color:#ddd;
padding:0 10px;
font-style:italic;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

@media(max-width:900px){
.grid{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:500px){
.grid{ grid-template-columns:1fr; }
}

/* CARD */
.card{
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
transform:translateY(15px);
opacity:0;
animation:fadeUp 0.5s ease forwards;
will-change: transform, opacity;
}

.card:nth-child(odd){ animation-delay:0.15s; }
.card:nth-child(even){ animation-delay:0.3s; }

@keyframes fadeUp{
to{ transform:translateY(0); opacity:1; }
}

.card img{
width:100%;
display:block;
}

/* MENSAJE */
.mensaje-numero{
position:absolute;
top:0;
width:100%;
padding:4px;
text-align:center;
font-size:11px;
font-weight:bold;
color:#000;

background:linear-gradient(
120deg,
#8c6f1d 0%,
#b8962e 30%,
#e0c15a 50%,
#b8962e 70%,
#8c6f1d 100%
);

background-size:200% auto;
animation:goldSweep 5s linear infinite;
}

/* TITULO */
.titulo{
position:absolute;
top:20px;
width:100%;
padding:5px;
text-align:center;
font-size:13px;
font-weight:bold;
background:rgba(0,0,0,0.6);
}

/* SHARE */
.share-btn{
position:absolute;
bottom:6px;
right:6px;
font-size:18px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
<img src="/test-pagina/logocasaroca.webp">
</div>

<div class="container">

<div class="title">¡ UN LLAMADO DE LA IGLESIA A IMPACTAR !</div>

<a class="location" href="https://maps.google.com/?q=Cl+58+27-32+Casa+Roca" target="_blank">
📍 Cl. 58 # 27-32 Casa Sobre la Roca
</a>

<p class="invite-main">Mateo 28:19-20</p>

<p class="frase">«Nadie es tan fuerte como todos nosotros juntos, porque en nuestra unión habita la presencia misma de Dios»</p>

<div class="grid" id="posts"></div>

</div>

<script>
// ⚡ IMÁGENES OPTIMIZADAS WEBP
const imagenes = [
"/test-pagina/11.webp",
"/test-pagina/12.webp",
"/test-pagina/13.webp",
"/test-pagina/14.webp",
"/test-pagina/15.webp",
"/test-pagina/16.webp",
"/test-pagina/17.webp",
"/test-pagina/18.webp",
"/test-pagina/19.webp",
"/test-pagina/20.webp"
];

const titulos = [
"Para quien no ha vuelto",
"Para el que cambió de dirección",
"Para el nuevo",
"Para un momento difícil",
"Para el que está desanimado",
"Para el que está avergonzado y con culpa",
"Para el que cree que no necesita a Dios",
"Para el que tiene problemas familiares",
"Para el que lucha con malos hábitos",
"Para quien es cabeza de familia"
];

const contenedor = document.getElementById("posts");

imagenes.forEach((img, i) => {
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="mensaje-numero">Mensaje ${i+1}</div>
<div class="titulo">${titulos[i]}</div>
<img src="${img}" ${i === 0 ? 'loading="eager"' : 'loading="lazy"'} decoding="async">
<div class="share-btn" onclick="compartir()">
<i class="fa-regular fa-share-from-square"></i>
</div>
`;

contenedor.appendChild(card);
});

// COMPARTIR
function compartir(){
if(navigator.share){
navigator.share({
title:"La Silla Vacía",
text:"Te invito a la iglesia 🙌",
url: location.href
});
}else{
window.open(`https://wa.me/?text=Te invito 🙌 ${location.href}`);
}
}
</script>

</body>
</html>
