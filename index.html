<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Silla Vacía</title>

<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" onload="this.rel='stylesheet'">

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0b1c2c;
color:white;
}

/* INTRO */
#splash{
position:fixed;
width:100%;
height:100%;
background:#0b1c2c;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 1s ease 2s forwards;
}

#splash img{
width:80%;
max-width:320px;
animation:zoom 1.2s ease;
}

@keyframes zoom{
0%{transform:scale(0.8);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0; visibility:hidden;}
}

/* CONTENIDO */
.container{
padding:12px;
opacity:0;
animation:show 0.8s ease 2.2s forwards;
}

@keyframes show{
to{opacity:1;}
}

.title{
text-align:center;
font-size:22px;
margin-bottom:10px;
font-weight:bold;
}

/* ✨ EFECTO REFLEJO DORADO */
@keyframes goldSweep {
0%{
background-position: -200% center;
}
100%{
background-position: 200% center;
}
}

/* BOTÓN UBICACIÓN */
.location{
display:flex;
justify-content:center;
margin:10px auto;
padding:10px;
border-radius:12px;
text-decoration:none;
font-size:13px;
font-weight:bold;
color:#000;

background:linear-gradient(
120deg,
#d4af37 0%,
#ffd700 25%,
#fff3b0 50%,
#ffd700 75%,
#d4af37 100%
);

background-size:200% auto;
animation:goldSweep 3s linear infinite;
}

/* TEXTOS */
.invite-main{
text-align:center;
margin-bottom:8px;
font-size:16px;
font-weight:bold;
color:#f5d27a;
}

.frase{
text-align:center;
font-size:13px;
margin-bottom:15px;
color:#ddd;
padding:0 10px;
font-style:italic;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
}

/* CARD */
.card{
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
will-change:transform;
}

.card img{
width:100%;
display:block;
}

/* MENSAJE CON EFECTO */
.mensaje-numero{
position:absolute;
top:0;
width:100%;
padding:5px;
text-align:center;
font-size:12px;
font-weight:bold;
color:#000;

background:linear-gradient(
120deg,
#d4af37 0%,
#ffd700 25%,
#fff3b0 50%,
#ffd700 75%,
#d4af37 100%
);

background-size:200% auto;
animation:goldSweep 4s linear infinite;
}

/* TITULO */
.titulo{
position:absolute;
top:22px;
width:100%;
padding:6px;
text-align:center;
font-size:14px;
font-weight:bold;
background:rgba(0,0,0,0.6);
}

/* SHARE */
.share-btn{
position:absolute;
bottom:8px;
right:8px;
font-size:20px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="splash">
<img src="logocasaroca.png">
</div>

<div class="container">

<div class="title">¡ UN LLAMADO DE LA IGLESIA A IMPACTAR !</div>

<a class="location" href="https://maps.google.com/?q=Cl+58+27-32+Casa+Roca" target="_blank">
📍 Cl. 58 # 27-32 Casa Sobre la Roca
</a>

<p class="invite-main">Mateo 28:19-20</p>

<p class="frase">«Nadie es tan fuerte como todos nosotros juntos, porque en nuestra unión habita la presencia misma de Dios»</p>

<div class="grid" id="posts"></div>

</div>

<script>
// IMÁGENES
const imagenes = [
"11.png","12.png","13.png","14.png","15.png",
"16.png","17.png","18.png","19.png","20.png"
];

const titulos = [
"Para quien no ha vuelto",
"Para el que cambió de dirección",
"Para el nuevo",
"Para un momento difícil",
"Para el que está desanimado",
"Para el que está avergonzado y con culpa",
"Para el que cree que no necesita a Dios",
"Para el que tiene problemas familiares",
"Para el que lucha con malos hábitos",
"Para quien es cabeza de familia"
];

const contenedor = document.getElementById("posts");

// CREAR TARJETAS
imagenes.forEach((img, i) => {
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="mensaje-numero">Mensaje ${i+1}</div>
<div class="titulo">${titulos[i]}</div>
<img src="${img}" loading="lazy">
<div class="share-btn" onclick="compartir()">
<i class="fa-regular fa-share-from-square"></i>
</div>
`;

contenedor.appendChild(card);
});

// COMPARTIR
function compartir(){
if(navigator.share){
navigator.share({
title:"La Silla Vacía",
text:"Te invito a la iglesia 🙌",
url: location.href
});
}else{
alert("Compartir no disponible");
}
}
</script>

</body>
</html>
